<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EFEEE9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Team Building TR">
<title>Team Building TR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#EFEEE9; --surface:#fff; --s2:#F6F5F0; --ink:#1A1A17; --muted:#7C786C;
    --line:#E5E2D9; --accent:#ED7D17; --accent2:#cf6a0c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{background:var(--bg)}
  body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none}
  h1,h2,h3{font-family:'Archivo',sans-serif;letter-spacing:-.02em}
  .mono{font-family:'IBM Plex Mono',monospace}
  /* top bar with logo + role switch */
  .topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;background:var(--bg);border-bottom:1px solid var(--line)}
  .topbar .brand{height:32px;width:auto;display:block;flex:0 0 auto}
  .topbar .pill{display:flex;gap:4px;padding:4px;background:var(--surface);border:1px solid var(--line);border-radius:999px;box-shadow:0 6px 20px -12px rgba(0,0,0,.3)}
  .topbar .pill button{border:0;background:none;padding:9px 18px;border-radius:999px;font:600 14px 'IBM Plex Sans';color:var(--muted);cursor:pointer}
  .topbar .pill button.on{background:var(--accent);color:#fff}
  /* phone */
  .stage{display:flex;justify-content:center;padding:6px 14px 56px}
  .phone{width:392px;max-width:100%;border-radius:46px;background:#0E0E0D;padding:12px;box-shadow:0 50px 110px -40px rgba(0,0,0,.55)}
  .screen-wrap{position:relative;border-radius:36px;overflow:hidden;background:var(--bg);height:760px}
  .screen{position:absolute;inset:0;overflow-y:auto;padding:26px 24px 40px}
  .statusbar{display:flex;justify-content:space-between;font:600 13px 'IBM Plex Sans';opacity:.8;margin-bottom:8px}
  .kicker{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .muted{color:var(--muted)}
  label.fld{display:block;font:600 13px 'IBM Plex Sans';margin:14px 0 6px}
  input,textarea,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);font:16px 'IBM Plex Sans';color:var(--ink)}
  textarea{min-height:70px;resize:vertical}
  .btn{display:block;width:100%;text-align:center;padding:15px;border:0;border-radius:14px;font:600 16px 'IBM Plex Sans';cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 12px 26px -14px var(--accent)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.sm{padding:11px;font-size:14px;width:auto;display:inline-block}
  .back{display:inline-block;font-size:24px;color:var(--ink);cursor:pointer;margin-bottom:6px;user-select:none}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:14px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:var(--surface);cursor:pointer;font:500 14px 'IBM Plex Sans';margin:0 8px 8px 0}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stars{display:flex;gap:6px;font-size:26px;cursor:pointer}
  .stars span{color:var(--line)}
  .stars span.on{color:var(--accent)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0E0E0D;color:#fff;padding:12px 18px;border-radius:12px;font:500 14px 'IBM Plex Sans';z-index:200;box-shadow:0 12px 30px -10px rgba(0,0,0,.5)}
  /* HR */
  .hr{max-width:1080px;margin:0 auto;padding:0 16px 60px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 4px}
  .tabs button{border:1px solid var(--line);background:var(--surface);padding:9px 16px;border-radius:999px;font:600 14px 'IBM Plex Sans';color:var(--muted);cursor:pointer}
  .tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px}
  .stat .n{font-family:'Archivo';font-weight:800;font-size:34px}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font:600 12px 'IBM Plex Sans';text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:999px;font:600 12px 'IBM Plex Sans';background:var(--s2);border:1px solid var(--line)}
  .row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
  .row > div{flex:1;min-width:140px}
  .center{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}

  /* in-app logo */
  .brandrow{display:flex;justify-content:center;margin-top:6px}
  .brand-inline{height:40px;width:auto;display:block}

  /* seasonal hero */
  .season{position:relative;overflow:hidden;border-radius:22px;margin-top:14px;color:var(--sink);
    background:var(--grad);min-height:178px;box-shadow:0 18px 44px -24px rgba(0,0,0,.45)}
  .season-body{position:relative;z-index:2;padding:20px 18px 22px}
  .season-badge{display:inline-flex;align-items:center;gap:6px;font:600 11px 'IBM Plex Mono',monospace;letter-spacing:.16em;
    text-transform:uppercase;background:rgba(255,255,255,.55);padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}
  .season-title{font-family:'Archivo';font-weight:800;font-size:26px;line-height:1.05;margin-top:12px;letter-spacing:-.02em}
  .season-when{font:600 13px 'IBM Plex Mono',monospace;margin-top:8px;opacity:.82}
  .season-sub{font-size:13.5px;margin-top:10px;max-width:30ch;line-height:1.4;opacity:.92}
  .season-particles{position:absolute;inset:0;z-index:1;pointer-events:none}
  .flake{position:absolute;top:-14%;will-change:transform,opacity;opacity:.9;line-height:1;
    animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite}
  @keyframes fall{
    0%{transform:translate3d(0,-24px,0) rotate(0deg);opacity:0}
    12%{opacity:.95}
    100%{transform:translate3d(var(--drift,0px),210px,0) rotate(300deg);opacity:.12}
  }
  /* summer: gentle float instead of fall */
  .season-summer .flake{animation-name:floaty;opacity:.85}
  @keyframes floaty{
    0%{transform:translate3d(0,8px,0) scale(.9);opacity:.2}
    50%{transform:translate3d(var(--drift,0px),-10px,0) scale(1.05);opacity:.9}
    100%{transform:translate3d(0,8px,0) scale(.9);opacity:.2}
  }
  @media (prefers-reduced-motion:reduce){ .flake{display:none} }

  /* media gallery */
  .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .media-cell{position:relative}
  .media-item{display:block;width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;background:var(--s2);border:1px solid var(--line)}
  .media-actions{position:absolute;top:6px;right:6px;display:flex;gap:6px}
  .mini{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;border:0;
    background:rgba(14,14,13,.6);color:#fff;font-size:14px;line-height:1;cursor:pointer;text-decoration:none;backdrop-filter:blur(3px)}
  .mini.danger{background:rgba(178,40,40,.85)}
  .btn.ghost.danger{color:#b22828;border-color:#e6bcbc}

  /* ===== MOBILE: full-screen app, no black frame ===== */
  @media (max-width:600px){
    .topbar{justify-content:center;flex-wrap:wrap;gap:10px;padding:calc(env(safe-area-inset-top) + 8px) 14px 8px}
    .topbar .brand{height:28px}
    .topbar .pill button{padding:8px 14px;font-size:13px}
    .stage{padding:0}
    .phone{width:100%;max-width:none;border-radius:0;background:transparent;padding:0;box-shadow:none}
    .screen-wrap{border-radius:0;height:auto;min-height:0;overflow:visible;background:transparent}
    .screen{position:static;inset:auto;overflow:visible;padding:16px 18px calc(env(safe-area-inset-bottom) + 30px)}
    .statusbar{display:none}
    .brand-inline{height:36px}
    .hr{padding:0 14px calc(env(safe-area-inset-bottom) + 40px)}
    .card{overflow-x:auto}
  }
</style>
</head>

// ====== Animazione stagionale (in base alla data dell'evento) ======
function seasonInfo(dateStr){
  let m = null;
  if(dateStr){ const d = new Date(dateStr); if(!isNaN(d)) m = d.getMonth()+1; }
  if(m==null) m = (new Date()).getMonth()+1;
  let key;
  if(m===12 || m<=2) key='winter';
  else if(m<=5) key='spring';
  else if(m<=8) key='summer';
  else key='autumn';
  const S = {
    winter:{label:'Inverno', emoji:['❄️','❅','❄','✦','❉'], grad:'linear-gradient(160deg,#e3edf5,#b6cfe4 55%,#93b4d4)', ink:'#143553', sub:'Aria frizzante e atmosfera di festa.'},
    spring:{label:'Primavera', emoji:['🌸','🌼','🌷','✿','❀'], grad:'linear-gradient(160deg,#ffe6f0,#ffd6c4 55%,#ffe7a6)', ink:'#7a2d4d', sub:'Tutto rifiorisce, come la voglia di stare insieme.'},
    summer:{label:'Estate', emoji:['☀️','🌻','🌴','✺','❂'], grad:'linear-gradient(160deg,#ffe8a3,#ffc25a 52%,#ff9d3d)', ink:'#7a3b00', sub:'Sole, serata lunga e buona compagnia.'},
    autumn:{label:'Autunno', emoji:['🍂','🍁','🌰','❧','✶'], grad:'linear-gradient(160deg,#ffdca6,#f0a45a 52%,#cf6a0c)', ink:'#5e2a0c', sub:'Foglie che cadono e calore di gruppo.'}
  };
  return Object.assign({key}, S[key]);
}
function seasonHero(){
  const s = seasonInfo(state.event?.event_date);
  let parts='';
  for(let i=0;i<16;i++){
    const left  = Math.round(Math.random()*100);
    const dur   = (6 + Math.random()*7).toFixed(2);
    const delay = (-Math.random()*10).toFixed(2);
    const size  = Math.round(14 + Math.random()*16);
    const drift = Math.round(Math.random()*44 - 22);
    const e = s.emoji[i % s.emoji.length];
    parts += `<span class="flake" style="left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;--drift:${drift}px">${e}</span>`;
  }
  const when = (esc(state.event?.event_date||'')+' '+esc(state.event?.event_time||'')).trim();
  return `<div class="season season-${s.key}" style="--grad:${s.grad};--sink:${s.ink}">
    <div class="season-particles">${parts}</div>
    <div class="season-body">
      <div class="season-badge">${s.label} ${s.emoji[0]}</div>
      <div class="season-title">${esc(state.event?.name||'Evento aziendale')}</div>
      ${when?`<div class="season-when">${when}</div>`:''}
      <div class="season-sub">${s.sub}</div>
    </div>
  </div>`;
}

// Nome del bucket Storage su Supabase (crealo dalla dashboard, vedi istruzioni)
const MEDIA_BUCKET = "event-media";
const VIDEO_EXT = ["mp4","mov","webm","m4v","3gp","avi","mkv","ogv"];
function isVideoName(n){ return VIDEO_EXT.includes((n.split('.').pop()||'').toLowerCase()); }

function toast(m){ const t=document.getElementById('toast'); t.innerHTML='<div class="toast">'+esc(m)+'</div>'; setTimeout(()=>{t.innerHTML='';},2600); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }

// Cartella per-utente: ${event_id}/${user_id}/file  → isola i caricamenti per dipendente
async function loadMyMedia(){
  state.media=[];
  if(!state.session || !state.event) return;
  const folder = state.event.id + '/' + state.session.user.id;
  const { data, error } = await SB.storage.from(MEDIA_BUCKET)
    .list(folder, { limit:300, sortBy:{ column:'created_at', order:'desc' } });
  if(error){ console.error('list mine', error); return; }
  const files = (data||[]).filter(f => f && f.name && f.name !== '.emptyFolderPlaceholder');
  if(!files.length) return;
  const paths = files.map(f => folder + '/' + f.name);
  const { data:signed, error:e2 } = await SB.storage.from(MEDIA_BUCKET).createSignedUrls(paths, 3600);
  if(e2){ console.error('sign', e2); return; }
  state.media = (signed||[]).map((s,i)=>({ url:s.signedUrl, name:files[i].name, path:paths[i] }));
}
// HR: tutti i contenuti dell'evento (gira nelle sottocartelle dei dipendenti)
async function loadAllMedia(){
  state.media=[];
  if(!state.event) return;
  const root = String(state.event.id);
  const { data:dirs, error } = await SB.storage.from(MEDIA_BUCKET).list(root, { limit:1000 });
  if(error){ console.error('list root', error); return; }
  let paths=[];
  for(const d of (dirs||[])){
    if(!d || d.name==='.emptyFolderPlaceholder') continue;
    if(d.id===null){ // sottocartella utente
      const { data:files } = await SB.storage.from(MEDIA_BUCKET)
        .list(root+'/'+d.name, { limit:1000, sortBy:{ column:'created_at', order:'desc' } });
      (files||[]).forEach(f=>{ if(f.name!=='.emptyFolderPlaceholder') paths.push(root+'/'+d.name+'/'+f.name); });
    } else {
      paths.push(root+'/'+d.name); // eventuale file diretto
    }
  }
  if(!paths.length) return;
  const { data:signed, error:e2 } = await SB.storage.from(MEDIA_BUCKET).createSignedUrls(paths, 3600);
  if(e2){ console.error('sign all', e2); return; }
  state.media = (signed||[]).map((s,i)=>({ url:s.signedUrl, path:paths[i], name:paths[i].split('/').pop() }));
}
async function uploadMedia(files){
  files = Array.from(files||[]);
  if(!files.length) return;
  if(!state.session){ toast('Accedi per caricare'); return; }
  if(!state.event){ toast('Nessun evento attivo'); return; }
  state.uploading=true; render();
  let ok=0, fail=0;
  for(const file of files){
    const safe = file.name.replace(/[^\w.\-]/g,'_');
    const path = `${state.event.id}/${state.session.user.id}/${Date.now()}-${safe}`;
    const { error } = await SB.storage.from(MEDIA_BUCKET)
      .upload(path, file, { contentType:file.type||undefined, upsert:false });
    if(error){ fail++; console.error('upload', error); } else ok++;
  }
  state.uploading=false;
  if(ok) toast(ok+' file caricati'+(fail?(' • '+fail+' non riusciti'):''));
  else toast('Caricamento non riuscito (controlla il bucket "'+MEDIA_BUCKET+'")');
  await loadMyMedia(); render();
}
async function deleteMedia(path){
  if(!path) return;
  if(!confirm('Eliminare definitivamente questo file?')) return;
  const { error } = await SB.storage.from(MEDIA_BUCKET).remove([path]);
  if(error){ toast(error.message); return; }
  toast('File eliminato');
  await loadAllMedia(); render();
}

async function deleteEvent(){
  if(!state.event){ toast('Nessun evento attivo'); return; }
  const ev=state.event;
  if(!confirm('Eliminare l\u2019evento "'+ev.name+'"?\nVerranno rimossi anche iscrizioni, sondaggi e inviti collegati. L\u2019operazione non \u00e8 reversibile.')) return;
  state.busy=true; render();
  // rimuovo prima i dati collegati (se non c'\u00e8 cascade sul DB)
  await SB.from('registrations').delete().eq('event_id', ev.id);
  await SB.from('survey_responses').delete().eq('event_id', ev.id);
  await SB.from('invites').delete().eq('event_id', ev.id);
  const { error } = await SB.from('events').delete().eq('id', ev.id);
  state.busy=false;
  if(error){ toast('Errore: '+error.message); render(); return; }
  state.media=[]; await loadEvent(); await loadHR(); state.hrTab='overview'; toast('Evento eliminato'); render();
}

  }
  const tab=state.hrTab; const d=state.hr;
  const tabs=['overview','participants','invites','results','media','newevent'];
  const labels={overview:'Panoramica',participants:'Partecipanti',invites:'Inviti',results:'Risultati',media:'Foto/Video',newevent:'Nuovo evento'};
  let body='';
  if(tab==='overview') body=hrOverview(d);
  else if(tab==='participants') body=hrParticipants(d);
  else if(tab==='invites') body=hrInvites(d);
  else if(tab==='results') body=hrResults(d);
  else if(tab==='media') body=hrMedia();
  else if(tab==='editevent') body=hrEditEvent();
  else body=hrNewEvent();
  const eventActions = state.event ? `<div class="row" style="gap:8px;margin:10px 0 2px">
      <button class="btn sm ghost" data-act="hrtab" data-arg="editevent">✏️ Modifica evento</button>
      <button class="btn sm ghost danger" data-act="deleteEvent" ${state.busy?'disabled':''}>🗑 Elimina evento</button>
    </div>` : '';
  return `<div class="hr">
    <h2 style="margin:6px 0">Console HR</h2>
    <p class="muted">Evento attivo: ${esc(state.event?.name||'nessuno — creane uno')}</p>
    ${eventActions}
    <div class="tabs">${tabs.map(t=>`<button class="${t===tab?'on':''}" data-act="hrtab" data-arg="${t}">${labels[t]}</button>`).join('')}</div>
    ${body}
  </div>`;
}
function hrOverview(d){
  const regs=d.regs||[], surv=d.surv||[];
  const conf=regs.filter(r=>r.status==='confirmed').length;
  return `<div class="grid">
    <div class="stat"><div class="n">${regs.length}</div><div class="muted">Iscritti</div></div>
    <div class="stat"><div class="n">${conf}</div><div class="muted">Confermati</div></div>
    <div class="stat"><div class="n">${surv.length}</div><div class="muted">Sondaggi</div></div>
    <div class="stat"><div class="n">${(d.inv||[]).length}</div><div class="muted">Inviti</div></div>
  </div>`;
}
function hrParticipants(d){
  const byId={}; (d.profs||[]).forEach(p=>byId[p.id]=p);
  const rows=(d.regs||[]).map(r=>{ const p=byId[r.user_id]||{};
    return `<tr><td>${esc(p.full_name||'—')}</td><td>${esc(p.email||'')}</td><td>${esc(p.department||'')}</td>
      <td>${esc((r.dietary||[]).join(', ')||'—')}</td><td>${esc(r.diet_notes||'')}</td></tr>`;}).join('');
  return `<div class="card"><table><thead><tr><th>Nome</th><th>Email</th><th>Reparto</th><th>Preferenze</th><th>Note</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" class="muted">Ancora nessun iscritto.</td></tr>'}</tbody></table></div>`;
}
function hrInvites(d){
  const rows=(d.inv||[]).map(i=>`<tr><td>${esc(i.email)}</td><td><span class="tag">${esc(i.type||'')}</span></td><td><span class="tag">${esc(i.status||'')}</span></td></tr>`).join('');
  return `<div class="card"><b>Aggiungi invito</b>
    <div class="row" style="margin-top:10px">
      <div><label class="fld">Email</label><input id="invEmail" placeholder="nome@azienda.it"></div>
      <div style="flex:0 0 160px"><label class="fld">Tipo</label>
        <select id="invType"><option value="nuovo">Nuovo</option><option value="iscritto">Già iscritto</option></select></div>
      <div style="flex:0 0 auto"><button class="btn sm" data-act="addInvite">Aggiungi</button></div>
    </div></div>
    <div class="card"><table><thead><tr><th>Email</th><th>Tipo</th><th>Stato</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="3" class="muted">Nessun invito.</td></tr>'}</tbody></table></div>`;
}
function hrResults(d){
  const s=d.surv||[]; const avg=k=> s.length? (s.reduce((a,x)=>a+(x[k]||0),0)/s.length).toFixed(1):'—';
  const comments=s.filter(x=>x.comment).map(x=>`<div class="card"><p>"${esc(x.comment)}"</p></div>`).join('');
  return `<div class="grid">
    <div class="stat"><div class="n">${avg('org')}</div><div class="muted">Organizzazione</div></div>
    <div class="stat"><div class="n">${avg('location')}</div><div class="muted">Location</div></div>
    <div class="stat"><div class="n">${avg('food')}</div><div class="muted">Cibo</div></div>
    <div class="stat"><div class="n">${avg('fun')}</div><div class="muted">Divertimento</div></div>
  </div>${comments?('<h3 style="margin-top:20px">Commenti</h3>'+comments):''}`;
}
function hrNewEvent(){
  return `<div class="card" style="max-width:560px">
    <b>Crea un nuovo evento</b>
    <label class="fld">Nome</label><input id="eName" placeholder="Festa d'Estate TR">
    <div class="row">
      <div><label class="fld">Data</label><input id="eDate" type="date"></div>
      <div><label class="fld">Orario</label><input id="eTime" placeholder="17:00 – 23:00"></div>
    </div>
    <label class="fld">Luogo</label><input id="ePlace" placeholder="Tenuta Le Querce, Atessa">
    <label class="fld">Capienza</label><input id="eCap" type="number" placeholder="80">
    <label class="fld">Descrizione</label><textarea id="eDesc" placeholder="Serata aziendale con cena, musica e premiazioni."></textarea>
    <div style="margin-top:16px"><button class="btn" data-act="createEvent" ${state.busy?'disabled':''}>${state.busy?'Attendi...':'Crea evento'}</button></div>
  </div>`;
}
function hrEditEvent(){
  const e=state.event||{};
  return `<div class="card" style="max-width:560px">
    <b>Modifica evento</b>
    <label class="fld">Nome</label><input id="eName" value="${esc(e.name||'')}">
    <div class="row">
      <div><label class="fld">Data</label><input id="eDate" type="date" value="${esc(e.event_date||'')}"></div>
      <div><label class="fld">Orario</label><input id="eTime" value="${esc(e.event_time||'')}"></div>
    </div>
    <label class="fld">Luogo</label><input id="ePlace" value="${esc(e.place||'')}">
    <label class="fld">Capienza</label><input id="eCap" type="number" value="${esc(e.capacity!=null?e.capacity:'')}">
    <label class="fld">Descrizione</label><textarea id="eDesc">${esc(e.description||'')}</textarea>
    <div class="row" style="margin-top:16px;gap:8px">
      <button class="btn" data-act="updateEvent" ${state.busy?'disabled':''}>${state.busy?'Attendi...':'Salva modifiche'}</button>
      <button class="btn ghost" data-act="hrtab" data-arg="overview">Annulla</button>
    </div>
  </div>`;
}
function hrMedia(){
  const media=state.media||[];
  if(state.mediaLoading) return `<div class="card muted">Carico i contenuti…</div>`;
  if(!state.event) return `<div class="card"><b>Nessun evento attivo.</b></div>`;
  if(!media.length) return `<div class="card"><b>Nessun contenuto caricato.</b>
    <p class="muted" style="margin-top:6px">Le foto e i video caricati dai dipendenti compariranno qui. Sono visibili solo all'HR.</p></div>`;
  return `<p class="muted" style="margin:8px 0">${media.length} contenuti caricati dai dipendenti. Tocca per ingrandire o scaricare; usa il cestino per rimuovere.</p>
    <div class="media-grid">${media.map(m=>`<div class="media-cell">
      ${mediaTile(m)}
      <div class="media-actions">
        <a class="mini" href="${m.url}" target="_blank" rel="noopener" title="Apri / scarica">⤢</a>
        <button class="mini danger" data-act="delMedia" data-arg="${esc(m.path)}" title="Elimina">🗑</button>
      </div>
    </div>`).join('')}</div>`;
}

// ---------- main render ----------
function render(){
  document.getElementById('roleEmp').className = state.role==='employee'?'on':'';
  document.getElementById('roleHr').className = state.role==='hr'?'on':'';
  document.getElementById('app').innerHTML = state.role==='employee'? renderEmployee() : renderHR();
}

// ---------- events ----------
document.addEventListener('click', async (ev)=>{
  const el = ev.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act, arg=el.dataset.arg, arg2=el.dataset.arg2;
  try{
    if(act==='role'){
      state.role=arg;
      if(arg==='hr'){ await loadProfile(); await loadHR(); }
      render(); return;
    }
    if(act==='go'){
      state.emp=arg;
      if(arg==='photos'){ state.media=[]; state.mediaLoading=true; render(); await loadMyMedia(); state.mediaLoading=false; }
      render(); return;
    }
    if(act==='register'){ await doRegister(); return; }
    if(act==='login'){ await doLogin(); return; }
    if(act==='logout'){ await doLogout(); return; }
    if(act==='iscriviti'){ await iscriviti(); return; }
    if(act==='diet'){ const i=state.diet.indexOf(arg); if(i>=0)state.diet.splice(i,1); else state.diet.push(arg); render(); return; }
    if(act==='saveDietary'){ await saveDietary(); return; }
    if(act==='pickMedia'){ const i=document.getElementById('mediaInput'); if(i) i.click(); return; }
    if(act==='delMedia'){ await deleteMedia(arg); return; }
    if(act==='rate'){ state.survey[arg]=parseInt(arg2); render(); return; }
    if(act==='saveSurvey'){ await saveSurvey(); return; }
    if(act==='hrtab'){
      state.hrTab=arg;
      if(!Object.keys(state.hr).length) await loadHR();
      if(arg==='media'){ state.media=[]; state.mediaLoading=true; render(); await loadAllMedia(); state.mediaLoading=false; }
      render(); return;
    }
    if(act==='addInvite'){ await addInvite(); return; }
    if(act==='createEvent'){ await createEvent(); return; }
    if(act==='updateEvent'){ await updateEvent(); return; }
    if(act==='deleteEvent'){ await deleteEvent(); return; }
  }catch(e){ toast('Errore: '+(e.message||e)); }
});
// upload da galleria (input file rigenerato a ogni render → delega su document)
document.addEventListener('change', (ev)=>{
  if(ev.target && ev.target.id==='mediaInput'){
    const files=ev.target.files;
    ev.target.value='';
    uploadMedia(files);
  }
});

// ---------- boot ----------
(async function(){
  document.getElementById('brandImg').src = LOGO;
  try{
    await loadSession();
    await refreshAll();
    if(state.session) state.emp='home';
  }catch(e){ toast('Connessione: '+(e.message||e)); }
  render();
})();
</script>
</body>
</html>
