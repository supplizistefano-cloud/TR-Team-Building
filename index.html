<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Building TR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#EFEEE9; --surface:#fff; --s2:#F6F5F0; --ink:#1A1A17; --muted:#7C786C;
    --line:#E5E2D9; --accent:#ED7D17; --accent2:#cf6a0c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh}
  h1,h2,h3{font-family:'Archivo',sans-serif;letter-spacing:-.02em}
  .mono{font-family:'IBM Plex Mono',monospace}
  /* role switch */
  .switch{position:sticky;top:0;z-index:50;display:flex;justify-content:center;padding:14px;background:var(--bg)}
  .switch .pill{display:flex;gap:4px;padding:4px;background:var(--surface);border:1px solid var(--line);border-radius:999px;box-shadow:0 6px 20px -12px rgba(0,0,0,.3)}
  .switch .pill button{border:0;background:none;padding:9px 18px;border-radius:999px;font:600 14px 'IBM Plex Sans';color:var(--muted);cursor:pointer}
  .switch .pill button.on{background:var(--accent);color:#fff}
  /* phone */
  .stage{display:flex;justify-content:center;padding:6px 14px 56px}
  .phone{width:392px;max-width:100%;border-radius:46px;background:#0E0E0D;padding:12px;box-shadow:0 50px 110px -40px rgba(0,0,0,.55)}
  .screen-wrap{position:relative;border-radius:36px;overflow:hidden;background:var(--bg);height:760px}
  .screen{position:absolute;inset:0;overflow-y:auto;padding:26px 24px 40px}
  .statusbar{display:flex;justify-content:space-between;font:600 13px 'IBM Plex Sans';opacity:.8;margin-bottom:8px}
  .kicker{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .muted{color:var(--muted)}
  label.fld{display:block;font:600 13px 'IBM Plex Sans';margin:14px 0 6px}
  input,textarea,select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);font:15px 'IBM Plex Sans';color:var(--ink)}
  textarea{min-height:70px;resize:vertical}
  .btn{display:block;width:100%;text-align:center;padding:15px;border:0;border-radius:14px;font:600 16px 'IBM Plex Sans';cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 12px 26px -14px var(--accent)}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .btn.sm{padding:11px;font-size:14px;width:auto;display:inline-block}
  .back{display:inline-block;font-size:24px;color:var(--ink);cursor:pointer;margin-bottom:6px;user-select:none}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:14px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:var(--surface);cursor:pointer;font:500 14px 'IBM Plex Sans';margin:0 8px 8px 0}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .stars{display:flex;gap:6px;font-size:26px;cursor:pointer}
  .stars span{color:var(--line)}
  .stars span.on{color:var(--accent)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0E0E0D;color:#fff;padding:12px 18px;border-radius:12px;font:500 14px 'IBM Plex Sans';z-index:200;box-shadow:0 12px 30px -10px rgba(0,0,0,.5)}
  /* HR */
  .hr{max-width:1080px;margin:0 auto;padding:0 16px 60px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 4px}
  .tabs button{border:1px solid var(--line);background:var(--surface);padding:9px 16px;border-radius:999px;font:600 14px 'IBM Plex Sans';color:var(--muted);cursor:pointer}
  .tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-top:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px}
  .stat .n{font-family:'Archivo';font-weight:800;font-size:34px}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font:600 12px 'IBM Plex Sans';text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .tag{display:inline-block;padding:3px 9px;border-radius:999px;font:600 12px 'IBM Plex Sans';background:var(--s2);border:1px solid var(--line)}
  .row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
  .row > div{flex:1;min-width:140px}
  .center{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="switch">
  <div class="pill">
    <button data-act="role" data-arg="employee" id="roleEmp">App dipendente</button>
    <button data-act="role" data-arg="hr" id="roleHr">Console HR</button>
  </div>
</div>
<div id="app"></div>
<div id="toast"></div>

<script>
// ====== CONFIG (collegato al tuo Supabase) ======
const SUPABASE_URL = "https://wbqpoprdmstetahnhqzl.supabase.co";
const SUPABASE_KEY = "sb_publishable_80LAqL_JuyMXB-6pU3r_yg_pNWclf25";
const SB = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DIET = ["Vegetariano","Vegano","Senza glutine","Senza lattosio","Halal","Allergie (vedi note)"];

const state = {
  role: "employee",
  session: null, profile: null, event: null, myReg: null, mySurvey: null,
  emp: "welcome", hrTab: "overview", hr: {}, busy: false,
  diet: [], dietNotes: "", survey: {org:0,location:0,food:0,fun:0,comment:""}
};

function toast(m){ const t=document.getElementById('toast'); t.innerHTML='<div class="toast">'+esc(m)+'</div>'; setTimeout(()=>{t.innerHTML='';},2600); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }

// ---------- data ----------
async function loadSession(){
  const { data } = await SB.auth.getSession();
  state.session = data.session || null;
}
async function loadProfile(){
  if(!state.session) { state.profile=null; return; }
  const { data } = await SB.from('profiles').select('*').eq('id', state.session.user.id).maybeSingle();
  state.profile = data || null;
}
async function loadEvent(){
  const { data } = await SB.from('events').select('*').order('created_at',{ascending:false}).limit(1);
  state.event = (data && data[0]) || null;
}
async function loadMine(){
  state.myReg=null; state.mySurvey=null;
  if(!state.session || !state.event) return;
  const uid = state.session.user.id, eid = state.event.id;
  const r = await SB.from('registrations').select('*').eq('user_id',uid).eq('event_id',eid).maybeSingle();
  state.myReg = r.data || null;
  if(state.myReg){ state.diet = state.myReg.dietary||[]; state.dietNotes = state.myReg.diet_notes||''; }
  const s = await SB.from('survey_responses').select('*').eq('user_id',uid).eq('event_id',eid).maybeSingle();
  state.mySurvey = s.data || null;
  if(state.mySurvey){ state.survey = {org:s.data.org||0,location:s.data.location||0,food:s.data.food||0,fun:s.data.fun||0,comment:s.data.comment||''}; }
}
async function refreshAll(){ await loadProfile(); await loadEvent(); await loadMine(); }

// ---------- auth ----------
async function doRegister(){
  const full_name=val('rName'), email=val('rEmail'), department=val('rDept'), password=val('rPass');
  if(!full_name||!email||!password){ toast('Compila nome, email e password'); return; }
  state.busy=true; render();
  const { error } = await SB.auth.signUp({ email, password, options:{ data:{ full_name, department } }});
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadSession(); await refreshAll();
  state.emp='home'; toast('Account creato!'); render();
}
async function doLogin(){
  const email=val('lEmail'), password=val('lPass');
  if(!email||!password){ toast('Inserisci email e password'); return; }
  state.busy=true; render();
  const { error } = await SB.auth.signInWithPassword({ email, password });
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadSession(); await refreshAll();
  state.emp='home'; render();
}
async function doLogout(){
  await SB.auth.signOut(); state.session=null; state.profile=null; state.myReg=null; state.mySurvey=null;
  state.emp='welcome'; state.role='employee'; render();
}

// ---------- employee actions ----------
async function iscriviti(){
  if(!state.session){ state.emp='login'; render(); return; }
  if(!state.event){ toast('Nessun evento disponibile'); return; }
  state.busy=true; render();
  const { error } = await SB.from('registrations').upsert(
    { user_id: state.session.user.id, event_id: state.event.id, status:'confirmed' },
    { onConflict:'user_id,event_id' });
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadMine(); state.emp='dietary'; render();
}
async function saveDietary(){
  state.dietNotes = val('dietNotes');
  state.busy=true; render();
  const { error } = await SB.from('registrations').upsert(
    { user_id: state.session.user.id, event_id: state.event.id, dietary: state.diet, diet_notes: state.dietNotes },
    { onConflict:'user_id,event_id' });
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadMine(); state.emp='confirm'; render();
}
async function addPhoto(){
  const n=(state.myReg?.photos_count||0)+1;
  await SB.from('registrations').upsert({ user_id:state.session.user.id, event_id:state.event.id, photos_count:n },{onConflict:'user_id,event_id'});
  await loadMine(); render();
}
async function saveSurvey(){
  state.survey.comment = val('svComment');
  state.busy=true; render();
  const p={ user_id:state.session.user.id, event_id:state.event.id,
    org:state.survey.org, location:state.survey.location, food:state.survey.food, fun:state.survey.fun, comment:state.survey.comment };
  const { error } = await SB.from('survey_responses').upsert(p,{onConflict:'user_id,event_id'});
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadMine(); state.emp='done'; render();
}

// ---------- HR ----------
async function loadHR(){
  state.hr={};
  if(!state.profile?.is_hr) return;
  const regs = await SB.from('registrations').select('*');
  const profs = await SB.from('profiles').select('*');
  const surv = await SB.from('survey_responses').select('*');
  const inv = await SB.from('invites').select('*').order('created_at',{ascending:false});
  state.hr = { regs:regs.data||[], profs:profs.data||[], surv:surv.data||[], inv:inv.data||[] };
}
async function addInvite(){
  const email=val('invEmail'); const type=val('invType')||'nuovo';
  if(!email){ toast('Inserisci una email'); return; }
  if(!state.event){ toast('Crea prima un evento'); return; }
  const { error } = await SB.from('invites').insert({ event_id:state.event.id, email, type, status:'coda' });
  if(error){ toast(error.message); return; }
  await loadHR(); toast('Invito aggiunto'); render();
}
async function createEvent(){
  const name=val('eName'); if(!name){ toast('Dai un nome all\u2019evento'); return; }
  const ev={ name, event_date:val('eDate')||null, event_time:val('eTime')||null,
    place:val('ePlace')||null, capacity: val('eCap')?parseInt(val('eCap')):null, description:val('eDesc')||null,
    steps:{dietary:true,confirm:true,info:true,photos:true,survey:true} };
  state.busy=true; render();
  const { error } = await SB.from('events').insert(ev);
  state.busy=false;
  if(error){ toast(error.message); render(); return; }
  await loadEvent(); await loadHR(); state.hrTab='overview'; toast('Evento creato!'); render();
}

// ---------- render: employee ----------
function statusBar(){ return '<div class="statusbar"><span>9:41</span><span class="mono">5G</span></div>'; }
function empWelcome(){
  return statusBar()+`
    <div style="margin-top:40px">
      <div class="kicker">Teambuilding 2026</div>
      <h1 style="font-size:40px;margin-top:10px">${esc(state.event?.name||'Evento aziendale')}</h1>
      <p class="muted" style="margin-top:14px;font-size:15px;line-height:1.5">Iscrizione, info e ricordi dell'evento, tutto in un posto.</p>
      <div style="margin-top:30px;display:flex;flex-direction:column;gap:10px">
        <button class="btn" data-act="go" data-arg="register">Crea il tuo account</button>
        <button class="btn ghost" data-act="go" data-arg="login">Accedi</button>
      </div>
    </div>`;
}
function empRegister(){
  return statusBar()+`
    <span class="back" data-act="go" data-arg="welcome">&lsaquo;</span>
    <h2 style="font-size:27px;margin-top:8px">Registrati</h2>
    <label class="fld">Nome e cognome</label><input id="rName" placeholder="Mario Rossi">
    <label class="fld">Email aziendale</label><input id="rEmail" type="email" placeholder="nome@azienda.it">
    <label class="fld">Reparto</label><input id="rDept" placeholder="es. Produzione">
    <label class="fld">Password</label><input id="rPass" type="password" placeholder="min 6 caratteri">
    <div style="margin-top:20px"><button class="btn" data-act="register" ${state.busy?'disabled':''}>${state.busy?'Attendi...':'Crea account'}</button></div>`;
}
function empLogin(){
  return statusBar()+`
    <span class="back" data-act="go" data-arg="welcome">&lsaquo;</span>
    <h2 style="font-size:27px;margin-top:8px">Accedi</h2>
    <label class="fld">Email</label><input id="lEmail" type="email" placeholder="nome@azienda.it">
    <label class="fld">Password</label><input id="lPass" type="password">
    <div style="margin-top:20px"><button class="btn" data-act="login" ${state.busy?'disabled':''}>${state.busy?'Attendi...':'Entra'}</button></div>`;
}
function empHome(){
  const name=(state.profile?.full_name||'').split(' ')[0]||'';
  if(!state.event){
    return statusBar()+`<h2 style="font-size:24px;margin-top:10px">Ciao ${esc(name)}</h2>
      <div class="card"><b>Nessun evento al momento.</b><p class="muted" style="margin-top:6px">L'HR non ha ancora pubblicato un evento.</p></div>
      <div style="margin-top:18px"><button class="btn ghost" data-act="logout">Esci</button></div>`;
  }
  const reg=state.myReg;
  return statusBar()+`
    <h2 style="font-size:24px;margin-top:6px">Ciao ${esc(name)} 👋</h2>
    <div class="card">
      <div class="kicker">Prossimo evento</div>
      <h3 style="font-size:22px;margin-top:8px">${esc(state.event.name)}</h3>
      <p class="muted" style="margin-top:6px">${esc(state.event.event_date||'')} ${esc(state.event.event_time||'')}<br>${esc(state.event.place||'')}</p>
      ${reg? '<div style="margin-top:12px"><span class="tag">Sei iscritto ✓</span></div>' : ''}
      <div style="margin-top:16px"><button class="btn" data-act="go" data-arg="event">${reg?'Vedi il tuo evento':'Iscriviti'}</button></div>
    </div>
    ${reg?`<div class="card">
      <b>Il tuo percorso</b>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
        <button class="btn ghost" data-act="go" data-arg="dietary">Preferenze alimentari</button>
        <button class="btn ghost" data-act="go" data-arg="info">Info finali</button>
        <button class="btn ghost" data-act="go" data-arg="photos">Foto dell'evento (${reg.photos_count||0})</button>
        <button class="btn ghost" data-act="go" data-arg="survey">Sondaggio finale</button>
      </div></div>`:''}
    <div style="margin-top:18px"><button class="btn ghost" data-act="logout">Esci</button></div>`;
}
function empEvent(){
  const e=state.event;
  return statusBar()+`<span class="back" data-act="go" data-arg="home">&lsaquo;</span>
    <h2 style="font-size:26px;margin-top:8px">${esc(e.name)}</h2>
    <div class="card"><p style="line-height:1.55">${esc(e.description||'Dettagli in arrivo.')}</p>
      <p class="muted" style="margin-top:12px">📅 ${esc(e.event_date||'')} ${esc(e.event_time||'')}<br>📍 ${esc(e.place||'')}</p></div>
    <div style="margin-top:16px"><button class="btn" data-act="iscriviti" ${state.busy?'disabled':''}>${state.myReg?'Aggiorna preferenze':'Conferma iscrizione'}</button></div>`;
}
function empDietary(){
  const chips=DIET.map(d=>`<span class="chip ${state.diet.includes(d)?'on':''}" data-act="diet" data-arg="${esc(d)}">${esc(d)}</span>`).join('');
  return statusBar()+`<span class="back" data-act="go" data-arg="home">&lsaquo;</span>
    <h2 style="font-size:24px;margin-top:8px">Preferenze alimentari</h2>
    <p class="muted" style="margin-top:6px">Seleziona ciò che ti riguarda.</p>
    <div style="margin-top:14px">${chips}</div>
    <label class="fld">Note (allergie, intolleranze...)</label>
    <textarea id="dietNotes" placeholder="Scrivi qui...">${esc(state.dietNotes)}</textarea>
    <div style="margin-top:18px"><button class="btn" data-act="saveDietary" ${state.busy?'disabled':''}>Salva e continua</button></div>`;
}
function empConfirm(){
  return statusBar()+`<h2 style="font-size:26px;margin-top:8px">Iscrizione confermata ✅</h2>
    <div class="card"><b>Riepilogo</b>
      <p class="muted" style="margin-top:8px">Evento: ${esc(state.event.name)}<br>
      Preferenze: ${esc((state.diet||[]).join(', ')||'nessuna')}<br>
      Note: ${esc(state.dietNotes||'—')}</p></div>
    <div style="margin-top:16px"><button class="btn" data-act="go" data-arg="info">Vedi info finali</button></div>
    <div style="margin-top:10px"><button class="btn ghost" data-act="go" data-arg="home">Torna alla home</button></div>`;
}
function empInfo(){
  const e=state.event;
  return statusBar()+`<span class="back" data-act="go" data-arg="home">&lsaquo;</span>
    <h2 style="font-size:24px;margin-top:8px">Info finali</h2>
    <div class="card"><b>Quando</b><p class="muted" style="margin-top:4px">${esc(e.event_date||'')} ${esc(e.event_time||'')}</p></div>
    <div class="card"><b>Dove</b><p class="muted" style="margin-top:4px">${esc(e.place||'—')}</p></div>
    <div class="card"><b>Dettagli</b><p class="muted" style="margin-top:4px;line-height:1.5">${esc(e.description||'—')}</p></div>`;
}
function empPhotos(){
  const n=state.myReg?.photos_count||0;
  return statusBar()+`<span class="back" data-act="go" data-arg="home">&lsaquo;</span>
    <h2 style="font-size:24px;margin-top:8px">Foto dell'evento</h2>
    <div class="card" style="text-align:center">
      <div style="font-family:Archivo;font-weight:800;font-size:48px;color:var(--accent)">${n}</div>
      <p class="muted">foto caricate</p>
      <div style="margin-top:14px"><button class="btn" data-act="addPhoto">+ Carica una foto</button></div>
    </div>
    <p class="muted" style="margin-top:10px;font-size:13px">Nota: in questa versione le foto sono simulate (conteggio). Possiamo aggiungere il caricamento reale come passo successivo.</p>`;
}
function stars(key){
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="${state.survey[key]>=i?'on':''}" data-act="rate" data-arg="${key}" data-arg2="${i}">★</span>`;
  return `<div class="stars">${s}</div>`;
}
function empSurvey(){
  return statusBar()+`<span class="back" data-act="go" data-arg="home">&lsaquo;</span>
    <h2 style="font-size:24px;margin-top:8px">Com'è andata?</h2>
    <div class="card"><b>Organizzazione</b>${stars('org')}</div>
    <div class="card"><b>Location</b>${stars('location')}</div>
    <div class="card"><b>Cibo</b>${stars('food')}</div>
    <div class="card"><b>Divertimento</b>${stars('fun')}</div>
    <label class="fld">Un commento?</label><textarea id="svComment" placeholder="Facoltativo...">${esc(state.survey.comment)}</textarea>
    <div style="margin-top:16px"><button class="btn" data-act="saveSurvey" ${state.busy?'disabled':''}>Invia sondaggio</button></div>`;
}
function empDone(){
  return statusBar()+`<div style="text-align:center;margin-top:80px">
    <div style="font-size:60px">🎉</div>
    <h2 style="font-size:28px;margin-top:14px">Grazie!</h2>
    <p class="muted" style="margin-top:8px">Il tuo feedback è stato registrato.</p>
    <div style="margin-top:24px"><button class="btn ghost" data-act="go" data-arg="home">Torna alla home</button></div></div>`;
}
function renderEmployee(){
  let inner;
  const logged = !!state.session;
  let scr = state.emp;
  if(!logged && !['welcome','register','login'].includes(scr)) scr='welcome';
  switch(scr){
    case 'register': inner=empRegister(); break;
    case 'login': inner=empLogin(); break;
    case 'home': inner=empHome(); break;
    case 'event': inner=empEvent(); break;
    case 'dietary': inner=empDietary(); break;
    case 'confirm': inner=empConfirm(); break;
    case 'info': inner=empInfo(); break;
    case 'photos': inner=empPhotos(); break;
    case 'survey': inner=empSurvey(); break;
    case 'done': inner=empDone(); break;
    default: inner=empWelcome();
  }
  return `<div class="stage"><div class="phone"><div class="screen-wrap"><div class="screen">${inner}</div></div></div></div>`;
}

// ---------- render: HR ----------
function renderHR(){
  if(!state.session){
    return `<div class="hr center"><div><h2>Console HR</h2><p class="muted" style="margin-top:10px">Accedi con il tuo account dalla "App dipendente", poi torna qui.</p></div></div>`;
  }
  if(!state.profile?.is_hr){
    return `<div class="hr center"><div><h2>Accesso HR non abilitato</h2>
      <p class="muted" style="margin-top:10px;max-width:420px">Il tuo account non è ancora HR. Esegui in Supabase (SQL Editor) questa riga, poi ricarica:</p>
      <pre style="text-align:left;background:var(--surface);border:1px solid var(--line);padding:14px;border-radius:12px;margin-top:12px;overflow:auto">update public.profiles set is_hr = true
where email = '${esc(state.session.user.email)}';</pre></div></div>`;
  }
  const tab=state.hrTab; const d=state.hr;
  const tabs=['overview','participants','invites','results','newevent'];
  const labels={overview:'Panoramica',participants:'Partecipanti',invites:'Inviti',results:'Risultati',newevent:'Nuovo evento'};
  let body='';
  if(tab==='overview') body=hrOverview(d);
  else if(tab==='participants') body=hrParticipants(d);
  else if(tab==='invites') body=hrInvites(d);
  else if(tab==='results') body=hrResults(d);
  else body=hrNewEvent();
  return `<div class="hr">
    <h2 style="margin:6px 0">Console HR</h2>
    <p class="muted">Evento attivo: ${esc(state.event?.name||'nessuno — creane uno')}</p>
    <div class="tabs">${tabs.map(t=>`<button class="${t===tab?'on':''}" data-act="hrtab" data-arg="${t}">${labels[t]}</button>`).join('')}</div>
    ${body}
  </div>`;
}
function hrOverview(d){
  const regs=d.regs||[], surv=d.surv||[];
  const conf=regs.filter(r=>r.status==='confirmed').length;
  return `<div class="grid">
    <div class="stat"><div class="n">${regs.length}</div><div class="muted">Iscritti</div></div>
    <div class="stat"><div class="n">${conf}</div><div class="muted">Confermati</div></div>
    <div class="stat"><div class="n">${surv.length}</div><div class="muted">Sondaggi</div></div>
    <div class="stat"><div class="n">${(d.inv||[]).length}</div><div class="muted">Inviti</div></div>
  </div>`;
}
function hrParticipants(d){
  const byId={}; (d.profs||[]).forEach(p=>byId[p.id]=p);
  const rows=(d.regs||[]).map(r=>{ const p=byId[r.user_id]||{};
    return `<tr><td>${esc(p.full_name||'—')}</td><td>${esc(p.email||'')}</td><td>${esc(p.department||'')}</td>
      <td>${esc((r.dietary||[]).join(', ')||'—')}</td><td>${esc(r.diet_notes||'')}</td></tr>`;}).join('');
  return `<div class="card"><table><thead><tr><th>Nome</th><th>Email</th><th>Reparto</th><th>Preferenze</th><th>Note</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="5" class="muted">Ancora nessun iscritto.</td></tr>'}</tbody></table></div>`;
}
function hrInvites(d){
  const rows=(d.inv||[]).map(i=>`<tr><td>${esc(i.email)}</td><td><span class="tag">${esc(i.type||'')}</span></td><td><span class="tag">${esc(i.status||'')}</span></td></tr>`).join('');
  return `<div class="card"><b>Aggiungi invito</b>
    <div class="row" style="margin-top:10px">
      <div><label class="fld">Email</label><input id="invEmail" placeholder="nome@azienda.it"></div>
      <div style="flex:0 0 160px"><label class="fld">Tipo</label>
        <select id="invType"><option value="nuovo">Nuovo</option><option value="iscritto">Già iscritto</option></select></div>
      <div style="flex:0 0 auto"><button class="btn sm" data-act="addInvite">Aggiungi</button></div>
    </div></div>
    <div class="card"><table><thead><tr><th>Email</th><th>Tipo</th><th>Stato</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="3" class="muted">Nessun invito.</td></tr>'}</tbody></table></div>`;
}
function hrResults(d){
  const s=d.surv||[]; const avg=k=> s.length? (s.reduce((a,x)=>a+(x[k]||0),0)/s.length).toFixed(1):'—';
  const comments=s.filter(x=>x.comment).map(x=>`<div class="card"><p>"${esc(x.comment)}"</p></div>`).join('');
  return `<div class="grid">
    <div class="stat"><div class="n">${avg('org')}</div><div class="muted">Organizzazione</div></div>
    <div class="stat"><div class="n">${avg('location')}</div><div class="muted">Location</div></div>
    <div class="stat"><div class="n">${avg('food')}</div><div class="muted">Cibo</div></div>
    <div class="stat"><div class="n">${avg('fun')}</div><div class="muted">Divertimento</div></div>
  </div>${comments?('<h3 style="margin-top:20px">Commenti</h3>'+comments):''}`;
}
function hrNewEvent(){
  return `<div class="card" style="max-width:560px">
    <b>Crea un nuovo evento</b>
    <label class="fld">Nome</label><input id="eName" placeholder="Festa d'Estate TR">
    <div class="row">
      <div><label class="fld">Data</label><input id="eDate" type="date"></div>
      <div><label class="fld">Orario</label><input id="eTime" placeholder="17:00 – 23:00"></div>
    </div>
    <label class="fld">Luogo</label><input id="ePlace" placeholder="Tenuta Le Querce, Atessa">
    <label class="fld">Capienza</label><input id="eCap" type="number" placeholder="80">
    <label class="fld">Descrizione</label><textarea id="eDesc" placeholder="Serata aziendale con cena, musica e premiazioni."></textarea>
    <div style="margin-top:16px"><button class="btn" data-act="createEvent" ${state.busy?'disabled':''}>${state.busy?'Attendi...':'Crea evento'}</button></div>
  </div>`;
}

// ---------- main render ----------
function render(){
  document.getElementById('roleEmp').className = state.role==='employee'?'on':'';
  document.getElementById('roleHr').className = state.role==='hr'?'on':'';
  document.getElementById('app').innerHTML = state.role==='employee'? renderEmployee() : renderHR();
}

// ---------- events ----------
document.addEventListener('click', async (ev)=>{
  const el = ev.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act, arg=el.dataset.arg, arg2=el.dataset.arg2;
  try{
    if(act==='role'){
      state.role=arg;
      if(arg==='hr'){ await loadProfile(); await loadHR(); }
      render(); return;
    }
    if(act==='go'){ state.emp=arg; render(); return; }
    if(act==='register'){ await doRegister(); return; }
    if(act==='login'){ await doLogin(); return; }
    if(act==='logout'){ await doLogout(); return; }
    if(act==='iscriviti'){ await iscriviti(); return; }
    if(act==='diet'){ const i=state.diet.indexOf(arg); if(i>=0)state.diet.splice(i,1); else state.diet.push(arg); render(); return; }
    if(act==='saveDietary'){ await saveDietary(); return; }
    if(act==='addPhoto'){ await addPhoto(); return; }
    if(act==='rate'){ state.survey[arg]=parseInt(arg2); render(); return; }
    if(act==='saveSurvey'){ await saveSurvey(); return; }
    if(act==='hrtab'){ state.hrTab=arg; if(!Object.keys(state.hr).length) await loadHR(); render(); return; }
    if(act==='addInvite'){ await addInvite(); return; }
    if(act==='createEvent'){ await createEvent(); return; }
  }catch(e){ toast('Errore: '+(e.message||e)); }
});

// ---------- boot ----------
(async function(){
  try{
    await loadSession();
    await refreshAll();
    if(state.session) state.emp='home';
  }catch(e){ toast('Connessione: '+(e.message||e)); }
  render();
})();
</script>
</body>
</html>
